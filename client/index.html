<!DOCTYPE html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta http-equiv="Content-Language" content="ja" />
    <meta name="language" content="Japanese" />
    <meta name="google" content="notranslate" />
    <meta name="robots" content="index, follow" />
    
    <title>距離比較アプリ - 複数の目的地への距離・時間を一括比較</title>
    <meta name="description" content="出発地から複数の目的地までの距離と所要時間を一括で比較できる便利なツールです。車、徒歩、電車、自転車の移動手段に対応。Google マップを活用した正確な距離計算で効率的なルート選択をサポートします。" />
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WV0QNPFVCD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-WV0QNPFVCD');
    </script>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Zucks Ad Network Footer Advertisement -->
    <div id="footer-ad-container" style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); background: white; border-top: 1px solid #e5e7eb; padding: 8px; width: 100%; max-width: 448px; z-index: 1000;">
      <div style="background: white; border-radius: 8px; padding: 4px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;">
        <script type="text/javascript" src="https://j.zucks.net.zimg.jp/j?f=693842"></script>
      </div>
    </div>

    <!-- Zucks Ad Network Modal Advertisement (Hidden by default) -->
    <div id="modal-ad-container" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; z-index: 2000; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);">
      <div style="text-align: center; margin-bottom: 20px;">
        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #374151;">月間利用制限に達しました</h3>
        <p style="font-size: 14px; color: #6b7280;">継続して利用するには、以下の広告を視聴してください。</p>
      </div>
      
      <div style="position: relative; background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; min-height: 250px; display: flex; align-items: center; justify-content: center;">
        <script type="text/javascript" src="https://j.zucks.net.zimg.jp/j?f=693608"></script>
        
        <!-- Close button positioned on top-right of the ad (hidden initially) -->
        <button id="modal-ad-close-btn" style="position: absolute; top: 9%; right: 13%; width: 15px; height: 15px; background: rgba(0, 0, 0, 0.7); color: white; border: none; border-radius: 50%; font-size: 10px; font-weight: bold; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;">
          ×
        </button>
      </div>
    </div>

    <!-- Modal backdrop -->
    <div id="modal-ad-backdrop" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1999;"></div>
    
    <!-- CSS for responsive layout -->
    <style>
      @media (min-width: 768px) {
        #footer-ad-container {
          max-width: 1024px;
        }
      }
      
      /* Adjust main content padding when on admin page */
      body[data-admin-page="true"] #root main {
        padding-bottom: 1rem !important;
      }
    </style>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Script to hide footer ad on admin page -->
    <script type="text/javascript">
      function checkAdminPage() {
        const footerAd = document.getElementById('footer-ad-container');
        const modalAd = document.getElementById('modal-ad-container');
        const modalBackdrop = document.getElementById('modal-ad-backdrop');
        const isAdminPage = window.location.pathname === '/admin';
        
        if (footerAd) {
          footerAd.style.display = isAdminPage ? 'none' : 'block';
        }
        
        // Hide modal ad on admin page if it's open
        if (isAdminPage && modalAd && modalBackdrop) {
          modalAd.style.display = 'none';
          modalBackdrop.style.display = 'none';
        }
        
        // Update body data attribute for CSS targeting
        document.body.setAttribute('data-admin-page', isAdminPage);
      }
      
      // Check on page load
      document.addEventListener('DOMContentLoaded', checkAdminPage);
      
      // Check on route changes (for SPA)
      let currentPath = window.location.pathname;
      setInterval(() => {
        if (window.location.pathname !== currentPath) {
          currentPath = window.location.pathname;
          checkAdminPage();
        }
      }, 100);
    </script>
    
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>

  </body>
</html>
